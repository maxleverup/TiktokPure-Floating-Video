<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Floating Panel</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      min-height: 40px;
    }

    .controls button {
      padding: 6px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
    }

    .controls button:hover {
      background: #f5f5f5;
    }

    .controls button:active {
      background: #e0e0e0;
    }

    .close-btn {
      background: #7a9e7e;
      color: white;
      border-color: #5d8a61;
    }

    .close-btn:hover {
      background: #5d8a61;
    }

    .iframe-container {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls">
      <div>
        <button id="refresh-btn">Refresh</button>
        <button id="mute-btn">Mute</button>
      </div>
      <button id="close-btn" class="close-btn">Close</button>
    </div>
    <div class="iframe-container">
      <div class="loading">Loading TikTok...</div>
      <iframe id="tiktok-iframe" src="https://www.tiktok.com" style="display: none;"></iframe>
    </div>
  </div>

  <!-- External script for CSP compliance -->
  <script src="float_panel.js"></script>
</body>
</html>
